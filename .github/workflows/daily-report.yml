name: Daily Stock Report

on:
  workflow_dispatch:
  schedule:
    - cron: "30 23 * * 0-4"

concurrency:
  group: investment-checklist-report-main
  cancel-in-progress: false

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Run daily pipeline
        run: node ./scripts/run-report-only.mjs

      - name: Commit generated reports
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -f reports/*.md data/universe.latest.csv
          if [ -f data/universe.enriched.csv ]; then
            git add -f data/universe.enriched.csv
          fi
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "Update daily stock report"
          git push

      - name: Upload report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: daily-stock-report
          path: |
            reports/*.md
            data/universe.latest.csv
            data/universe.enriched.csv

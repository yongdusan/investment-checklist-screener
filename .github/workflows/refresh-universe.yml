name: Refresh Stock Universe

on:
  workflow_dispatch:
  schedule:
    - cron: "0 22 * * 6"

concurrency:
  group: investment-checklist-report-main
  cancel-in-progress: false

jobs:
  refresh-and-publish:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Refresh universe and report
        env:
          OPENDART_API_KEY: ${{ secrets.OPENDART_API_KEY }}
        run: node ./scripts/run-daily-pipeline.mjs

      - name: Commit refreshed data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -f reports/*.md data/universe.latest.csv
          if [ -f data/universe.enriched.csv ]; then
            git add -f data/universe.enriched.csv
          fi
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "Refresh stock universe and report"
          git push

      - name: Upload refresh artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: refreshed-stock-universe
          path: |
            reports/*.md
            data/universe.latest.csv
            data/universe.enriched.csv
